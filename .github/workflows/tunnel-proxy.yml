name: 代理跳板
on:
  workflow_dispatch:
  schedule:
    - cron: '50 */5 * * *' # 每5小时自动续期，规避6小时超时

jobs:
  proxy-tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 最大6小时保活
    steps:
      - name: 配置SSH免密连接腾讯云
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ALIYUN_SSH_PRIV }}" > ~/.ssh/aliyun_tunnel_key
          chmod 600 ~/.ssh/aliyun_tunnel_key
          cat > ~/.ssh/config << EOF
          Host tunnel
            HostName ${{ secrets.ALIYUN_IP }}
            User ${{ secrets.ALIYUN_USER }}
            Port ${{ secrets.ALIYUN_SSH_PORT }}
            IdentityFile ~/.ssh/aliyun_tunnel_key
            StrictHostKeyChecking no
            ServerAliveInterval 30
            ServerAliveCountMax 3
          EOF
          chmod 644 ~/.ssh/config

      - name: 启动【真正反向全局代理】腾讯云走GitHub海外IP
        run: |
          # 核心关键：在腾讯云远端开启SOCKS，出口为GitHub网络
          ssh -N \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            -o ExitOnForwardFailure=yes \
            -R 127.0.0.1:10800:0.0.0.0:0 \
            tunnel &

          sleep 3
          echo "✅ 真正反向代理启动成功"
          echo "✅ 腾讯云所有流量将从GitHub美国IP出口"
          echo "👉 代理：socks5://127.0.0.1:10800"

          # 保活6小时
          timeout 21600 sleep 99999
